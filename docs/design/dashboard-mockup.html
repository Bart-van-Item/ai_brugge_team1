document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"778e3c43-5560-48e7-8df7-3d5568adaaa5\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0}\n  input[type=range]{-webkit-appearance:none;height:4px;border-radius:3px;background:#e5e7eb;outline:none;cursor:pointer}\n  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#374151;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25)}\n  ::selection{background:rgba(255,190,30,.35)}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex;min-height:100vh;font-family:'Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;color:#1a1a1a;background:#fff;font-size:14px;line-height:1.5\">\n\n  <aside style=\"width:236px;flex:0 0 236px;background:#f7f7f8;border-right:1px solid #e8e8ea;padding:22px 14px;position:sticky;top:0;height:100vh;overflow:auto\">\n    <div style=\"display:flex;align-items:center;gap:9px;padding:0 6px 4px\">\n      <div style=\"width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#ffbe1e,#ff9a1e);display:flex;align-items:center;justify-content:center;font-size:15px\">☀<\u002Fdiv>\n      <div>\n        <div style=\"font-size:14px;font-weight:700;letter-spacing:-.01em\">PV Dashboard<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9ca3af;margin-top:-1px\">AI Brugge · Team 1<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ navGroups }}\" as=\"grp\" hint-placeholder-count=\"4\">\n      <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#a1a5ad;margin:16px 8px 5px\">{{ grp.group }}<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ grp.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n            <sc-if value=\"{{ item.dotStyle }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fsc-if>\n            {{ item.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"margin-top:26px;padding:11px 10px;background:#eef2f7;border-radius:8px;font-size:11px;color:#6b7280;line-height:1.45\">Per-15-min PV &amp; weather · Bruges · since Jan 2025 · Open-Meteo<\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;min-width:0;padding:28px 36px 60px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap\">\n      <h1 style=\"margin:0;font-size:25px;font-weight:700;letter-spacing:-.02em\">{{ pageTitle }}<\u002Fh1>\n      <span style=\"font-size:13px;color:#9ca3af\">{{ pageIntro }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showFilters }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"border:1px solid #e8e8ea;border-radius:11px;margin-top:16px;background:#fafafa;overflow:hidden\">\n        <button onclick=\"{{ toggleFilters }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;padding:11px 16px;cursor:pointer;font:inherit;font-size:13px;color:#374151;font-weight:600\">\n          <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:#9ca3af\">⚙<\u002Fspan>Filters<span style=\"font-weight:500;color:#9ca3af;font-size:12px\">— {{ dateLabel }}<\u002Fspan><\u002Fspan>\n          <span style=\"{{ chevStyle }}\">⌄<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ filtersOpen }}\">\n          <div style=\"display:flex;gap:30px;flex-wrap:wrap;padding:2px 16px 16px;border-top:1px solid #eee\">\n            <div style=\"flex:1 1 340px;padding-top:12px\">\n              <div style=\"font-size:12px;color:#6b7280;margin-bottom:9px\">Date range · <span style=\"color:#111;font-weight:600\">{{ dateLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:center\">\n                <input type=\"range\" min=\"0\" max=\"364\" value=\"{{ dateStart }}\" oninput=\"{{ onDateStart }}\" style=\"flex:1\">\n                <input type=\"range\" min=\"0\" max=\"364\" value=\"{{ dateEnd }}\" oninput=\"{{ onDateEnd }}\" style=\"flex:1\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showSiteSelect }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding-top:12px\">\n                <div style=\"font-size:12px;color:#6b7280;margin-bottom:9px\">Sites<\u002Fdiv>\n                <div style=\"display:flex;gap:16px\">\n                  <sc-for list=\"{{ siteChecks }}\" as=\"s\" hint-placeholder-count=\"3\">\n                    <label style=\"display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;user-select:none\">\n                      <input type=\"checkbox\" checked=\"{{ s.checked }}\" onchange=\"{{ s.onChange }}\" style=\"accent-color:{{ s.color }};width:15px;height:15px\">\n                      <span style=\"{{ s.dotStyle }}\"><\u002Fspan>{{ s.label }}\n                    <\u002Flabel>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ metrics }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:13px;margin-top:18px\">\n        <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1 1 158px;min-width:150px;background:#fff;border:1px solid #e8e8ea;border-radius:11px;padding:14px 16px\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#6b7280\">\n              <sc-if value=\"{{ m.dotStyle }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"{{ m.dotStyle }}\"><\u002Fspan><\u002Fsc-if>{{ m.label }}\n              <sc-if value=\"{{ m.help }}\"><span title=\"{{ m.help }}\" style=\"cursor:help;color:#cbd0d8;font-size:11px\">ⓘ<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em;line-height:1.05\">{{ m.value }}<span style=\"font-size:13px;font-weight:500;color:#9ca3af;margin-left:5px\">{{ m.unit }}<\u002Fspan><\u002Fdiv>\n            <sc-if value=\"{{ m.deltaText }}\"><div style=\"{{ m.deltaStyle }}\">{{ m.deltaText }}<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ m.sub }}\"><div style=\"font-size:11px;color:#9ca3af;margin-top:3px\">{{ m.sub }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ OVERVIEW ============ -->\n    <sc-if value=\"{{ is_overview }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px\">\n          <h3 style=\"margin:0;font-size:15.5px;font-weight:650\">Energy output over time<\u002Fh3>\n          <div style=\"display:flex;gap:3px;background:#f1f2f4;padding:3px;border-radius:8px\">\n            <sc-for list=\"{{ aggSeg }}\" as=\"o\" hint-placeholder-count=\"3\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:7px 0 4px\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        {{ c1 }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SITE ============ -->\n    <sc-if value=\"{{ is_site }}\">\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px\">\n        <div style=\"flex:1 1 460px;min-width:340px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Daily output<\u002Fh3>\n          <p style=\"margin:0 0 6px;font-size:12px;color:#9ca3af\">kWh per day across the selected range, with a 7-day average.<\u002Fp>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n            <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          {{ c1 }}\n        <\u002Fdiv>\n        <div style=\"flex:1 1 380px;min-width:320px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Average day shape<\u002Fh3>\n          <p style=\"margin:0 0 10px;font-size:12px;color:#9ca3af\">Mean output per hour on sunny days. The peak reveals orientation.<\u002Fp>\n          {{ c2 }}\n          <div style=\"font-size:12px;color:#6b7280;margin-top:8px\">Peak around <b style=\"color:#111\">{{ peakHourLabel }}<\u002Fb> · array facing <b style=\"color:#111\">{{ siteFacing }}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ COMPARE ============ -->\n    <sc-if value=\"{{ is_compare }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:4px\">\n          <div style=\"display:flex;align-items:center;gap:9px;font-size:13px;color:#6b7280\">Compare by\n            <div style=\"display:flex;gap:3px;background:#f1f2f4;padding:3px;border-radius:8px;flex-wrap:wrap\">\n              <sc-for list=\"{{ compareSeg }}\" as=\"o\" hint-placeholder-count=\"4\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ aggSeg }}\"><div style=\"display:flex;gap:3px;background:#f1f2f4;padding:3px;border-radius:8px\">\n            <sc-for list=\"{{ aggSeg }}\" as=\"o\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <p style=\"margin:2px 0 8px;font-size:12.5px;color:#6b7280\">{{ compareNote }}<\u002Fp>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 8px\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ c1 }}\">{{ c1 }}<\u002Fsc-if>\n        <sc-if value=\"{{ charTable }}\">\n          <sc-for list=\"{{ charCols }}\" as=\"c\"><\u002Fsc-for><sc-for list=\"{{ charTable }}\" as=\"row\"><\u002Fsc-for><sc-for list=\"{{ row.cells }}\" as=\"v\"><\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px;margin-top:4px\">\n            <thead><tr>\n              <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Metric<\u002Fth>\n              <th style=\"text-align:right;padding:9px 10px;border-bottom:2px solid #ececec;font-weight:650;color:{{ c.color }}\">{{ c.label }}<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr>\n                <td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;color:#374151\">{{ row.label }}<\u002Ftd>\n                <td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;text-align:right;font-variant-numeric:tabular-nums\">{{ v }}<\u002Ftd>\n              <\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ TIME OF DAY ============ -->\n    <sc-if value=\"{{ is_time }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px\">\n          <h3 style=\"margin:0;font-size:15.5px;font-weight:650\">Average output by hour of day<\u002Fh3>\n          <div style=\"display:flex;gap:3px;background:#f1f2f4;padding:3px;border-radius:8px\">\n            <sc-for list=\"{{ todSeg }}\" as=\"o\" hint-placeholder-count=\"4\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 6px\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        {{ c1 }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ WEATHER ============ -->\n    <sc-if value=\"{{ is_weather }}\">\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px\">\n        <div style=\"flex:1 1 440px;min-width:340px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Irradiance vs output<\u002Fh3>\n          <p style=\"margin:0 0 10px;font-size:12px;color:#9ca3af\">Each point is a 15-min interval, colored by month.<\u002Fp>\n          {{ c1 }}\n        <\u002Fdiv>\n        <div style=\"flex:1 1 380px;min-width:320px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px\">\n            <h3 style=\"margin:0;font-size:15.5px;font-weight:650\">Temperature effect<\u002Fh3>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#6b7280;margin:6px 0 2px\">Irradiance band · <b style=\"color:#111\">{{ bandLabel }}<\u002Fb><\u002Fdiv>\n          <input type=\"range\" min=\"200\" max=\"900\" step=\"50\" value=\"{{ weatherBand }}\" oninput=\"{{ setBand }}\" style=\"width:100%;accent-color:#f5b400\">\n          <div style=\"margin-top:6px\">{{ c2 }}<\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:11.5px;color:#9ca3af;line-height:1.45\">Mean kWh/kWp per temperature bin at fixed irradiance. The upward trend is a seasonal artefact — warm days are also the clearest.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ANOMALIES ============ -->\n    <sc-if value=\"{{ is_anom }}\">\n      <div style=\"display:flex;gap:20px;flex-wrap:wrap;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px;margin-top:16px\">\n        <div style=\"flex:1 1 240px\">\n          <div style=\"font-size:12px;color:#6b7280;margin-bottom:8px\">Anomaly threshold · <b style=\"color:#111\">z &lt; -{{ anomZ }}<\u002Fb><\u002Fdiv>\n          <input type=\"range\" min=\"1\" max=\"3\" step=\"0.1\" value=\"{{ anomZ }}\" oninput=\"{{ setZ }}\" style=\"width:100%;accent-color:#dc2626\">\n        <\u002Fdiv>\n        <div style=\"flex:1 1 240px\">\n          <div style=\"font-size:12px;color:#6b7280;margin-bottom:8px\">Min daily irradiance · <b style=\"color:#111\">{{ anomMinRad }} kWh/m²<\u002Fb><\u002Fdiv>\n          <input type=\"range\" min=\"0.5\" max=\"5\" step=\"0.25\" value=\"{{ anomMinRad }}\" oninput=\"{{ setMinRad }}\" style=\"width:100%;accent-color:#6b7280\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n        <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Yield ratio, with flagged days<\u002Fh3>\n        <p style=\"margin:0 0 6px;font-size:12px;color:#9ca3af\">Actual ÷ expected yield. Red markers fall below the threshold on bright-enough days.<\u002Fp>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        {{ c1 }}\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px;margin-top:16px\">\n        <h3 style=\"margin:0 0 8px;font-size:15px;font-weight:650\">Flagged days <span style=\"color:#9ca3af;font-weight:500\">({{ anomCount }})<\u002Fspan><\u002Fh3>\n        <sc-for list=\"{{ anomRows }}\" as=\"r\" hint-placeholder-count=\"4\"><\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n          <thead><tr>\n            <th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Date<\u002Fth>\n            <th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Site<\u002Fth>\n            <th style=\"text-align:right;padding:8px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Yield ratio<\u002Fth>\n            <th style=\"text-align:right;padding:8px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">z-score<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr>\n              <td style=\"padding:8px 10px;border-bottom:1px solid #f2f2f2\">{{ r.date }}<\u002Ftd>\n              <td style=\"padding:8px 10px;border-bottom:1px solid #f2f2f2\"><span style=\"{{ r.dotStyle }}\"><\u002Fspan>{{ r.site }}<\u002Ftd>\n              <td style=\"padding:8px 10px;border-bottom:1px solid #f2f2f2;text-align:right;font-variant-numeric:tabular-nums\">{{ r.ratio }}<\u002Ftd>\n              <td style=\"padding:8px 10px;border-bottom:1px solid #f2f2f2;text-align:right;color:#dc2626;font-weight:600;font-variant-numeric:tabular-nums\">{{ r.z }}<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin:10px 0 0;font-size:11.5px;color:#9ca3af;line-height:1.45\">The worst days are shared across all three sites — regional drizzle and fog, not snow or a site-specific fault.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ MODELS ============ -->\n    <sc-if value=\"{{ is_models }}\">\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px\">\n        <div style=\"flex:1 1 400px;min-width:320px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Inverter clipping<\u002Fh3>\n          <p style=\"margin:0 0 8px;font-size:12px;color:#9ca3af\">Normalized max output vs irradiance. The plateau is the inverter capping the array.<\u002Fp>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n            <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          {{ c1 }}\n        <\u002Fdiv>\n        <div style=\"flex:1 1 380px;min-width:320px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Model comparison (R²)<\u002Fh3>\n          <p style=\"margin:0 0 10px;font-size:12px;color:#9ca3af\">Per-site models on a chronological train/test split.<\u002Fp>\n          {{ c2 }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px\">\n        <div style=\"flex:1 1 340px;min-width:300px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px\">\n          <h3 style=\"margin:0 0 8px;font-size:15px;font-weight:650\">General vs specific models<\u002Fh3>\n          <sc-for list=\"{{ charCols }}\" as=\"c\"><\u002Fsc-for><sc-for list=\"{{ pivotRows }}\" as=\"r\"><\u002Fsc-for><sc-for list=\"{{ r.cells }}\" as=\"v\"><\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n            <thead><tr><th style=\"text-align:left;padding:7px 8px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Feature set<\u002Fth>\n              <th style=\"text-align:right;padding:7px 8px;border-bottom:2px solid #ececec;font-weight:650;color:{{ c.color }}\">{{ c.label }}<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody><tr>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2;color:#374151\">{{ r.label }}<\u002Ftd>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2;text-align:right;font-variant-numeric:tabular-nums\">{{ v }}<\u002Ftd>\n            <\u002Ftr><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 340px;min-width:300px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px\">\n          <h3 style=\"margin:0 0 8px;font-size:15px;font-weight:650\">Inferred panel orientation<\u002Fh3>\n          <sc-for list=\"{{ orientRows }}\" as=\"r\"><\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n            <thead><tr>\n              <th style=\"text-align:left;padding:7px 8px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Site<\u002Fth>\n              <th style=\"text-align:right;padding:7px 8px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Peak hour<\u002Fth>\n              <th style=\"text-align:right;padding:7px 8px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Azimuth<\u002Fth>\n              <th style=\"text-align:right;padding:7px 8px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Facing<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody><tr>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2\"><span style=\"{{ r.dotStyle }}\"><\u002Fspan>{{ r.site }}<\u002Ftd>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2;text-align:right;font-variant-numeric:tabular-nums\">{{ r.peak }}<\u002Ftd>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2;text-align:right;font-variant-numeric:tabular-nums\">{{ r.az }}<\u002Ftd>\n              <td style=\"padding:7px 8px;border-bottom:1px solid #f2f2f2;text-align:right\">{{ r.facing }}<\u002Ftd>\n            <\u002Ftr><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ PREDICT ============ -->\n    <sc-if value=\"{{ is_predict }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px;margin-top:16px\">\n        <div style=\"display:flex;gap:26px;flex-wrap:wrap\">\n          <div style=\"flex:1 1 200px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#6b7280;margin-bottom:7px\"><span>Irradiance<\u002Fspan><span style=\"font-weight:700;color:#111\">{{ predIrr }} W/m²<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"0\" max=\"1000\" step=\"20\" value=\"{{ predIrr }}\" oninput=\"{{ setPredIrr }}\" style=\"width:100%;accent-color:#f5b400\">\n          <\u002Fdiv>\n          <div style=\"flex:1 1 200px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#6b7280;margin-bottom:7px\"><span>Hour of day<\u002Fspan><span style=\"font-weight:700;color:#111\">{{ predHourLabel }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"4\" max=\"21\" step=\"1\" value=\"{{ predHour }}\" oninput=\"{{ setPredHour }}\" style=\"width:100%;accent-color:#374151\">\n          <\u002Fdiv>\n          <div style=\"flex:1 1 200px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#6b7280;margin-bottom:7px\"><span>Temperature<\u002Fspan><span style=\"font-weight:700;color:#111\">{{ predTemp }} °C<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"-5\" max=\"38\" step=\"1\" value=\"{{ predTemp }}\" oninput=\"{{ setPredTemp }}\" style=\"width:100%;accent-color:#e07b39\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:13px;margin-top:16px\">\n        <sc-for list=\"{{ predMetrics }}\" as=\"m\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1 1 158px;min-width:150px;background:#fff;border:1px solid #e8e8ea;border-radius:11px;padding:14px 16px\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#6b7280\"><span style=\"{{ m.dotStyle }}\"><\u002Fspan>{{ m.label }}<\u002Fdiv>\n            <div style=\"font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em\">{{ m.value }}<span style=\"font-size:13px;font-weight:500;color:#9ca3af;margin-left:5px\">kW<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#9ca3af;margin-top:3px\">at {{ predHourLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px\">\n        <div style=\"flex:1 1 440px;min-width:340px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Predicted daily curve<\u002Fh3>\n          <p style=\"margin:0 0 8px;font-size:12px;color:#9ca3af\">Output at the peak irradiance you set. Marker shows the selected hour.<\u002Fp>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n            <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          {{ c1 }}\n        <\u002Fdiv>\n        <div style=\"flex:1 1 360px;min-width:320px;background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Irradiance sweep<\u002Fh3>\n          <p style=\"margin:0 0 10px;font-size:12px;color:#9ca3af\">Output vs sun strength at {{ predHourLabel }}. Flat tops are inverter clipping.<\u002Fp>\n          {{ c2 }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ TODAY ============ -->\n    <sc-if value=\"{{ is_today }}\">\n      <sc-if value=\"{{ todayNotFetched }}\">\n        <div style=\"background:#fff;border:1px dashed #d6dae0;border-radius:14px;padding:44px 20px;margin-top:18px;text-align:center\">\n          <div style=\"font-size:34px\">🛰️<\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:650;margin-top:8px\">Fetch today's weather<\u002Fdiv>\n          <p style=\"margin:6px auto 16px;max-width:420px;font-size:13px;color:#9ca3af\">Pull today's hourly irradiance and temperature live from Open-Meteo, then predict output for all three sites.<\u002Fp>\n          <button onclick=\"{{ doFetch }}\" style=\"background:#111;color:#fff;border:none;border-radius:9px;padding:11px 22px;font:inherit;font-size:14px;font-weight:600;cursor:pointer\">Fetch weather →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ todayFetched }}\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:13px;margin-top:18px;align-items:stretch\">\n          <sc-for list=\"{{ metrics2 }}\" as=\"m\" hint-placeholder-count=\"2\">\n            <div style=\"flex:1 1 158px;min-width:150px;background:#fff;border:1px solid #e8e8ea;border-radius:11px;padding:14px 16px\">\n              <div style=\"font-size:12px;color:#6b7280\">{{ m.label }}<\u002Fdiv>\n              <div style=\"font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em\">{{ m.value }}<span style=\"font-size:13px;font-weight:500;color:#9ca3af;margin-left:5px\">{{ m.unit }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{ doFetch }}\" style=\"flex:0 0 auto;align-self:center;background:#f1f2f4;color:#374151;border:1px solid #e5e7eb;border-radius:9px;padding:10px 16px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto\">↻ Refresh<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n          <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Today's predicted output<\u002Fh3>\n          <p style=\"margin:0 0 8px;font-size:12px;color:#9ca3af\">Solid = prediction · dashed = actual recorded so far.<\u002Fp>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n            <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          {{ c1 }}\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:13px;margin-top:16px\">\n          <sc-for list=\"{{ totalCards }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div style=\"flex:1 1 158px;min-width:150px;background:#fff;border:1px solid #e8e8ea;border-radius:11px;padding:14px 16px\">\n              <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#6b7280\"><span style=\"{{ m.dotStyle }}\"><\u002Fspan>{{ m.label }}<\u002Fdiv>\n              <div style=\"font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em\">{{ m.value }}<span style=\"font-size:13px;font-weight:500;color:#9ca3af;margin-left:5px\">kWh<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11px;color:#9ca3af;margin-top:3px\">estimated day total<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:11.5px;color:#9ca3af\">Weather (irradiance &amp; temperature) via <a href=\"https://open-meteo.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#9ca3af;font-weight:600\">Open-Meteo<\u002Fa> · CC BY 4.0<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <!-- ============ WEEK AHEAD ============ -->\n    <sc-if value=\"{{ is_week }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:16px 20px;margin-top:16px\">\n        <div style=\"font-size:13px;color:#6b7280;margin-bottom:12px\">Set the expected sky for each day — the forecast updates instantly.<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <sc-for list=\"{{ weekDays }}\" as=\"d\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1 1 84px;min-width:82px;text-align:center;position:relative\">\n              <div style=\"font-size:12px;font-weight:600;color:#374151\">{{ d.label }}<\u002Fdiv>\n              <div style=\"font-size:10.5px;color:#9ca3af;margin-bottom:6px\">{{ d.date }}<\u002Fdiv>\n              <button onclick=\"{{ d.toggle }}\" style=\"{{ d.btnStyle }}\">{{ d.icon }}<\u002Fbutton>\n              <sc-if value=\"{{ d.open }}\">\n                <div style=\"position:absolute;left:50%;transform:translateX(-50%);top:100%;margin-top:6px;width:132px;background:#fff;border:1px solid #e8e8ea;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:4px;z-index:30;display:flex;flex-direction:column;gap:2px\">\n                  <sc-for list=\"{{ d.options }}\" as=\"o\" hint-placeholder-count=\"3\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"font-size:16px;width:20px;text-align:center\">{{ o.icon }}<\u002Fspan>{{ o.name }}<\u002Fbutton><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:13px;margin-top:16px\">\n        <sc-for list=\"{{ weekTotals }}\" as=\"m\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1 1 158px;min-width:150px;background:#fff;border:1px solid #e8e8ea;border-radius:11px;padding:14px 16px\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#6b7280\"><span style=\"{{ m.dotStyle }}\"><\u002Fspan>{{ m.label }}<\u002Fdiv>\n            <div style=\"font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em\">{{ m.value }}<span style=\"font-size:13px;font-weight:500;color:#9ca3af;margin-left:5px\">kWh<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#9ca3af;margin-top:3px\">7-day forecast<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:18px 20px;margin-top:16px\">\n        <h3 style=\"margin:0 0 2px;font-size:15.5px;font-weight:650\">Predicted daily output<\u002Fh3>\n        <p style=\"margin:0 0 8px;font-size:12px;color:#9ca3af\">Estimated kWh per site per day.<\u002Fp>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 6px\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\"><span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280\"><span style=\"{{ lg.style }}\"><\u002Fspan>{{ lg.label }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        {{ c1 }}\n        <div style=\"margin-top:14px;font-size:11.5px;color:#9ca3af\">Sky &amp; irradiance forecast via <a href=\"https://open-meteo.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#9ca3af;font-weight:600\">Open-Meteo<\u002Fa> · CC BY 4.0<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DATA GUIDE ============ -->\n    <sc-if value=\"{{ is_data_guide }}\">\n      <div style=\"background:#fff;border:1px solid #e8e8ea;border-radius:13px;padding:20px 22px;margin-top:18px;max-width:820px\">\n        <h3 style=\"margin:0 0 4px;font-size:16px;font-weight:650\">Where the data comes from<\u002Fh3>\n        <table style=\"width:100%;border-collapse:collapse;font-size:13px;margin:10px 0 22px\">\n          <thead><tr>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Source<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Granularity<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">What it gives us<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-weight:600\">PV inverter output<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">15 min<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">AC energy per house (House 1 &amp; 2)<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-weight:600\">Reactor meter<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">15 min<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">AC energy for the large array<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-weight:600\">Open-Meteo weather<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Hourly<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Irradiance (W/m²), temperature, cloud cover<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <h3 style=\"margin:0 0 6px;font-size:16px;font-weight:650\">What we know about the panels<\u002Fh3>\n        <p style=\"margin:0 0 20px;font-size:13px;color:#4b5563;line-height:1.6\">We have installed capacity, inverter size and an EAN meter code per site, but no brand or module model. Orientation isn't documented — we <b>infer<\u002Fb> it from the shape of the average production day (see Models). The EAN code identifies the grid connection point, not the hardware.<\u002Fp>\n        <h3 style=\"margin:0 0 6px;font-size:16px;font-weight:650\">Weather predictor columns<\u002Fh3>\n        <table style=\"width:100%;border-collapse:collapse;font-size:13px;margin-top:10px\">\n          <thead><tr>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Column<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #ececec;color:#6b7280;font-weight:600\">Meaning<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-family:monospace\">shortwave_radiation<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Global horizontal irradiance, W/m² — the strongest predictor<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-family:monospace\">temperature_2m<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Air temperature, °C — panels lose efficiency when hot<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-family:monospace\">cloud_cover<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Total cloud, % — proxy for diffuse vs direct light<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2;font-family:monospace\">hour (sin/cos)<\u002Ftd><td style=\"padding:9px 10px;border-bottom:1px solid #f2f2f2\">Cyclical time of day — encodes the sun's arc<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <h3 style=\"margin:24px 0 6px;font-size:16px;font-weight:650\">Sources &amp; attribution<\u002Fh3>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n          <div style=\"flex:1 1 260px;border:1px solid #eee;border-radius:10px;padding:13px 15px;background:#fafafa\">\n            <div style=\"font-size:13px;font-weight:650;margin-bottom:3px\">Irradiance &amp; temperature<\u002Fdiv>\n            <p style=\"margin:0;font-size:12.5px;color:#4b5563;line-height:1.55\">Historical and forecast weather from the <a href=\"https://open-meteo.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#1f77b4;font-weight:600;text-decoration:none\">Open-Meteo API<\u002Fa> for the Bruges location. Data licensed <a href=\"https://creativecommons.org/licenses/by/4.0/\" target=\"_blank\" rel=\"noopener\" style=\"color:#1f77b4;text-decoration:none\">CC BY 4.0<\u002Fa>; based on ERA5, DWD ICON and other national weather services.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 260px;border:1px solid #eee;border-radius:10px;padding:13px 15px;background:#fafafa\">\n            <div style=\"font-size:13px;font-weight:650;margin-bottom:3px\">PV output<\u002Fdiv>\n            <p style=\"margin:0;font-size:12.5px;color:#4b5563;line-height:1.55\">Per-15-minute inverter and grid-meter readings from the three installations, collected by AI Brugge · Team 1 since January 2025.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.SITES = {\n      house1:{key:'house1',label:'House 1',color:'#1f77b4',fill:'rgba(31,119,180,.14)',kwp:6.25,inv:4.0,dcac:1.56,az:201,facing:'S (+W)',arrays:'3 arrays (4 + 1.5 + 0.75)',typDaily:17,typYield:2.75},\n      house2:{key:'house2',label:'House 2',color:'#ff7f0e',fill:'rgba(255,127,14,.14)',kwp:2.4,inv:2.2,dcac:1.09,az:199,facing:'S (+W)',arrays:'1 array',typDaily:7.5,typYield:3.11},\n      reactor:{key:'reactor',label:'Reactor',color:'#2ca02c',fill:'rgba(44,160,44,.14)',kwp:32.7,inv:22,dcac:1.49,az:182,facing:'S',arrays:'2 arrays (16.35 + 16.35)',typDaily:77,typYield:2.35},\n    };\n    this.SUN='#f5b400';\n    this.state = {\n      page:'overview', filtersOpen:false, dateStart:0, dateEnd:364,\n      sel:{house1:true,house2:true,reactor:true},\n      agg:'Day', compareView:'Specific yield',\n      todAll:true,\n      weatherBand:500, anomZ:2.0, anomMinRad:2.0,\n      predIrr:720, predHour:13, predTemp:20,\n      todayFetched:false, todayPeak:0, todayTemp:0,\n      weekSky:['clear','cloudy','clear','clear','overcast','cloudy','clear'], weekOpen:null,\n    };\n    this.data = this.buildData();\n  }\n  // ---------- data ----------\n  rng(seed){let a=seed;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}\n  buildData(){\n    const r=this.rng(7), S=this.SITES, days={house1:[],house2:[],reactor:[]}, cloud=[],temp=[],irr=[];\n    for(let d=0;d<365;d++){\n      let s=0.5+0.5*Math.cos(2*Math.PI*(d-172)/365); s=0.08+0.92*Math.pow(s,1.3);\n      const c=0.28+0.72*Math.pow(r(),0.75); cloud.push(c);\n      irr.push((180+780*s)*(0.4+0.6*c));\n      temp.push(5+13*(0.5+0.5*Math.cos(2*Math.PI*(d-205)/365))+(r()-0.5)*4);\n      Object.keys(S).forEach(k=>days[k].push(s*c*(0.85+0.3*r())));\n    }\n    Object.keys(S).forEach(k=>{const a=days[k];const m=a.reduce((x,y)=>x+y,0)/a.length;const sc=S[k].typDaily/m;days[k]=a.map(v=>+(v*sc).toFixed(2));});\n    return {days,cloud,temp,irr};\n  }\n  // ---------- helpers ----------\n  g(x,mu,sig){return Math.exp(-0.5*Math.pow((x-mu)/sig,2));}\n  peakHour(k){return 12+(this.SITES[k].az-180)/15;}\n  range(){return [this.state.dateStart,this.state.dateEnd];}\n  selected(){return Object.keys(this.SITES).filter(k=>this.state.sel[k]);}\n  sum(arr,a,b){let s=0;for(let i=a;i<=b;i++)s+=arr[i];return s;}\n  kfmt(v){return Math.round(v).toLocaleString('en-US');}\n  fmtNum(v){if(Math.abs(v)>=1000)return (v/1000).toFixed(v%1000?1:0).replace(/\\.0$/,'')+'k';if(Number.isInteger(v))return ''+v;return (+v.toFixed(Math.abs(v)<1?2:1)).toString();}\n  dstr(i){const d=new Date(2025,0,1+i);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}\n  hourLabel(h){return (h<10?'0':'')+h+':00';}\n  periodDelta(arr,a,b){const len=b-a+1;const cur=this.sum(arr,a,b);const pa=Math.max(0,a-len),pb=a-1;if(pb<pa)return{pct:0,up:true};const prev=this.sum(arr,pa,pb);const pct=prev?(cur-prev)/prev*100:0;return{pct,up:pct>=0};}\n  niceTicks(a,b,n){const span=(b-a)||1;const step0=span/n;const mag=Math.pow(10,Math.floor(Math.log10(step0)));const nm=step0/mag;let st=nm<1.5?1:nm<3?2:nm<7?5:10;st*=mag;const start=Math.ceil(a/st)*st;const t=[];for(let v=start;v<=b+1e-9;v+=st)t.push(+v.toFixed(6));return t;}\n  monthTicks(a,b){const cum=[0,31,59,90,120,151,181,212,243,273,304,334];const L=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const out=[];cum.forEach((v,i)=>{if(v>=a&&v<=b)out.push({v,label:L[i]});});if(out.length<2)return[{v:a,label:this.dstr(a)},{v:b,label:this.dstr(b)}];return out;}\n  hourTicks(){return [0,4,8,12,16,20,24].map(v=>({v,label:''+v}));}\n  swatch(color,dash){return dash?{display:'inline-block',width:16,height:0,borderTop:'2.5px dashed '+color}:{display:'inline-block',width:15,height:3,borderRadius:2,background:color};}\n  dot(color){return {width:9,height:9,borderRadius:'50%',background:color,display:'inline-block',flex:'0 0 auto',marginRight:2};}\n  segStyle(active){return {padding:'5px 11px',border:'none',borderRadius:6,cursor:'pointer',font:'inherit',fontSize:12,whiteSpace:'nowrap',background:active?'#fff':'transparent',color:active?'#111':'#6b7280',fontWeight:active?600:500,boxShadow:active?'0 1px 2px rgba(0,0,0,.08)':'none'};}\n  seg(opts,cur,set){return opts.map(o=>{const val=(o&&o.value!==undefined)?o.value:o;const lab=(o&&o.label!==undefined)?o.label:o;const active=val===cur;return {label:lab,onClick:()=>set(val),style:this.segStyle(active)};});}\n  // ---------- charts ----------\n  plot(cfg){\n    const el=React.createElement, w=cfg.w||720, H=cfg.h||300;\n    const pad=Object.assign({l:52,r:16,t:14,b:34},cfg.pad||{});\n    const iw=w-pad.l-pad.r, ih=H-pad.t-pad.b;\n    let[x0,x1]=cfg.xDomain,[y0,y1]=cfg.yDomain; if(x1===x0)x1=x0+1; if(y1===y0)y1=y0+1;\n    const sx=v=>pad.l+(v-x0)/(x1-x0)*iw, sy=v=>pad.t+ih-(v-y0)/(y1-y0)*ih;\n    const yt=cfg.yTicks||this.niceTicks(y0,y1,5), K=[];\n    yt.forEach((t,i)=>{const Y=sy(t);K.push(el('line',{key:'g'+i,x1:pad.l,x2:pad.l+iw,y1:Y,y2:Y,stroke:'#eef0f2'}));K.push(el('text',{key:'yl'+i,x:pad.l-8,y:Y+3.5,textAnchor:'end',fontSize:10,fill:'#9ca3af'},cfg.yFmt?cfg.yFmt(t):this.fmtNum(t)));});\n    (cfg.xTicks||[]).forEach((t,i)=>K.push(el('text',{key:'xl'+i,x:sx(t.v),y:pad.t+ih+16,textAnchor:'middle',fontSize:10,fill:'#9ca3af'},t.label)));\n    (cfg.series||[]).forEach((s,si)=>{\n      if(!s.data&&s.type!=='vline')return;\n      if(s.type==='area'){const line='M'+s.data.map(p=>sx(p.x)+' '+sy(p.y)).join(' L ');K.push(el('path',{key:'a'+si,d:line+' L '+sx(s.data[s.data.length-1].x)+' '+sy(y0)+' L '+sx(s.data[0].x)+' '+sy(y0)+' Z',fill:s.fill,stroke:'none'}));K.push(el('path',{key:'al'+si,d:line,fill:'none',stroke:s.color,strokeWidth:2}));}\n      else if(s.type==='line')K.push(el('path',{key:'l'+si,d:'M'+s.data.map(p=>sx(p.x)+' '+sy(p.y)).join(' L '),fill:'none',stroke:s.color,strokeWidth:s.width||2,strokeDasharray:s.dashed?'5 4':null,opacity:s.opacity==null?1:s.opacity}));\n      else if(s.type==='scatter')s.data.forEach((p,pi)=>K.push(el('circle',{key:'s'+si+'_'+pi,cx:sx(p.x),cy:sy(p.y),r:s.r||2.3,fill:p.color||s.color,opacity:s.opacity==null?0.7:s.opacity})));\n      else if(s.type==='vline')K.push(el('line',{key:'v'+si,x1:sx(s.x),x2:sx(s.x),y1:pad.t,y2:pad.t+ih,stroke:s.color||'#9ca3af',strokeWidth:1,strokeDasharray:'4 3'}));\n      else if(s.type==='dot')s.data.forEach((p,pi)=>K.push(el('circle',{key:'d'+si+'_'+pi,cx:sx(p.x),cy:sy(p.y),r:s.r||4,fill:s.color,stroke:'#fff',strokeWidth:1.5})));\n    });\n    K.push(el('line',{key:'ax',x1:pad.l,x2:pad.l+iw,y1:pad.t+ih,y2:pad.t+ih,stroke:'#d1d5db'}));\n    if(cfg.yLabel)K.push(el('text',{key:'ylab',x:13,y:pad.t+ih/2,fontSize:10,fill:'#9ca3af',transform:'rotate(-90 13 '+(pad.t+ih/2)+')',textAnchor:'middle'},cfg.yLabel));\n    return el('svg',{viewBox:'0 0 '+w+' '+H,width:'100%',height:H,preserveAspectRatio:'xMidYMid meet',style:{display:'block'}},K);\n  }\n  bars(cfg){\n    const el=React.createElement, w=cfg.w||720, H=cfg.h||300;\n    const pad=Object.assign({l:50,r:14,t:14,b:38},cfg.pad||{}), iw=w-pad.l-pad.r, ih=H-pad.t-pad.b;\n    let y1=cfg.yMax||Math.max.apply(null,cfg.groups.flatMap(g=>g.bars.map(b=>b.value)))*1.15; if(!y1)y1=1;\n    const sy=v=>pad.t+ih-v/y1*ih, K=[], yt=this.niceTicks(0,y1,5);\n    yt.forEach((t,i)=>{const Y=sy(t);K.push(el('line',{key:'g'+i,x1:pad.l,x2:pad.l+iw,y1:Y,y2:Y,stroke:'#eef0f2'}));K.push(el('text',{key:'yl'+i,x:pad.l-8,y:Y+3.5,textAnchor:'end',fontSize:10,fill:'#9ca3af'},cfg.yFmt?cfg.yFmt(t):this.fmtNum(t)));});\n    const n=cfg.groups.length, gw=iw/n;\n    cfg.groups.forEach((g,gi)=>{const nb=g.bars.length, inner=gw*0.72, bw=inner/nb, gx=pad.l+gi*gw+(gw-inner)/2;\n      g.bars.forEach((b,bi)=>{const X=gx+bi*bw, Y=sy(b.value);K.push(el('rect',{key:'b'+gi+'_'+bi,x:X+1,y:Y,width:Math.max(1,bw-2),height:pad.t+ih-Y,fill:b.color,rx:2}));});\n      K.push(el('text',{key:'gl'+gi,x:pad.l+gi*gw+gw/2,y:pad.t+ih+16,textAnchor:'middle',fontSize:10,fill:'#6b7280'},g.label));});\n    K.push(el('line',{key:'ax',x1:pad.l,x2:pad.l+iw,y1:pad.t+ih,y2:pad.t+ih,stroke:'#d1d5db'}));\n    if(cfg.yLabel)K.push(el('text',{key:'ylab',x:13,y:pad.t+ih/2,fontSize:10,fill:'#9ca3af',transform:'rotate(-90 13 '+(pad.t+ih/2)+')',textAnchor:'middle'},cfg.yLabel));\n    return el('svg',{viewBox:'0 0 '+w+' '+H,width:'100%',height:H,preserveAspectRatio:'xMidYMid meet',style:{display:'block'}},K);\n  }\n  legItem(label,color,dash){return {label,style:this.swatch(color,dash)};}\n  // ---------- domain calcs ----------\n  profile(k,total){const ph=this.peakHour(k),a=[];let s=0;for(let h=0;h<24;h++){const v=this.g(h,ph,3.0);a.push(v);s+=v;}return a.map((v,h)=>({x:h,y:v/s*total}));}\n  predictAtHour(k,irr,temp){const S=this.SITES[k];const eff=0.86*(1-0.0038*(temp-25));return Math.max(0,Math.min(S.inv,S.kwp*irr/1000*eff));}\n  predictDay(k,peakIrr,temp){const ph=this.peakHour(k),a=[];for(let h=0;h<24;h++){const poa=peakIrr*this.g(h,ph,3.1);a.push({x:h,y:this.predictAtHour(k,poa,temp)});}return a;}\n  dayTotal(k,peakIrr,temp){return this.predictDay(k,peakIrr,temp).reduce((s,p)=>s+p.y,0);}\n  monthColor(m){const c=['#2c3e9e','#2d6cb5','#3aa0a8','#4bbf73','#8fce4b','#e8c534','#f0a72e','#ef7d2e','#e85d3a','#c94d6b','#7b53a6','#3f45a0'];return c[m];}\n  // ---------- nav ----------\n  buildNav(){\n    const groups=[['Start',[['overview','Overview'],['data_guide','Data guide']]],['Sites',[['house1','House 1'],['house2','House 2'],['reactor','Reactor'],['compare','Compare']]],['Analysis',[['time_of_day','Time of day'],['weather','Weather'],['anomalies','Anomalies']]],['Machine learning',[['models','Models'],['predict','Predict'],['today','Today'],['week','Week ahead']]]];\n    return groups.map(([group,items])=>({group,items:items.map(([id,label])=>{const active=this.state.page===id;const S=this.SITES[id];return {id,label,dotStyle:S?this.dot(S.color):null,onClick:()=>this.setState({page:id,filtersOpen:false}),style:{display:'flex',alignItems:'center',gap:8,width:'100%',textAlign:'left',padding rs({groups,yMax:1,yLabel:'R²',h:280,pad:{l:44,r:12,t:12,b:34}})};\n  }\n  pdPredict(){\n    const S=this.SITES,{predIrr,predHour,predTemp}=this.state;\n    const series=Object.keys(S).map(k=>({type:'line',data:this.predictDay(k,predIrr,predTemp),color:S[k].color,width:2}));\n    const dots=Object.keys(S).map(k=>({x:predHour,y:this.predictDay(k,predIrr,predTemp)[predHour].y,color:S[k].color}));\n    series.push({type:'vline',x:predHour,color:'#c0c4cc'});series.push({type:'dot',data:dots,color:'#374151',r:4});\n    const ymax=Math.max.apply(null,Object.keys(S).map(k=>Math.max.apply(null,this.predictDay(k,predIrr,predTemp).map(p=>p.y))))*1.15||1;\n    const sweep=Object.keys(S).map(k=>{const p=[];for(let irr=0;irr<=1000;irr+=40)p.push({x:irr,y:this.predictDay(k,irr,predTemp)[predHour].y});return{type:'line',data:p,color:S[k].color,width:2};});\n    const smax=Math.max.apply(null,sweep.flatMap(s=>s.data.map(p=>p.y)))*1.15||1;\n    return{predIrr,predTemp,predHour,predHourLabel:this.hourLabel(predHour),\n      setPredIrr:e=>this.setState({predIrr:+e.target.value}),setPredHour:e=>this.setState({predHour:+e.target.value}),setPredTemp:e=>this.setState({predTemp:+e.target.value}),\n      predMetrics:Object.keys(S).map(k=>({label:S[k].label,dotStyle:this.dot(S[k].color),value:this.predictDay(k,predIrr,predTemp)[predHour].y.toFixed(2)})),\n      legend:Object.keys(S).map(k=>this.legItem(S[k].label,S[k].color)),\n      c1:this.plot({series,xDomain:[0,24],yDomain:[0,ymax],xTicks:this.hourTicks(),yLabel:'kW',h:300}),\n      c2:this.plot({series:sweep,xDomain:[0,1000],yDomain:[0,smax],xTicks:[0,250,500,750,1000].map(v=>({v,label:''+v})),yLabel:'kW',h:260,pad:{l:46,r:14,t:14,b:34}})};\n  }\n  pdToday(){\n    const S=this.SITES;\n    if(!this.state.todayFetched)return{todayNotFetched:true,todayFetched:false,doFetch:()=>this.fetchToday()};\n    const peak=this.state.todayPeak,temp=this.state.todayTemp;\n    const r=this.rng(Math.round(peak));\n    const series=[],totals=[];const nowH=14;\n    Object.keys(S).forEach(k=>{const pred=this.predictDay(k,peak,temp);series.push({type:'line',data:pred,color:S[k].color,width:2});const act=pred.filter(p=>p.x<=nowH).map(p=>({x:p.x,y:p.y*(0.82+0.28*r())}));series.push({type:'line',data:act,color:S[k].color,width:2,dashed:true});totals.push({label:S[k].label,dotStyle:this.dot(S[k].color),value:this.kfmt(pred.reduce((s,p)=>s+p.y,0))});});\n    const ymax=Math.max.apply(null,Object.keys(S).map(k=>Math.max.apply(null,this.predictDay(k,peak,temp).map(p=>p.y))))*1.15;\n    return{todayNotFetched:false,todayFetched:true,doFetch:()=>this.fetchToday(),\n      metrics2:[{label:'Peak irradiance',value:Math.round(peak),unit:'W/m²'},{label:'Avg temperature',value:temp.toFixed(1),unit:'°C'}],\n      legend:[this.legItem('predicted','#374151'),this.legItem('actual so far','#374151',true)],\n      totalCards:totals,\n      c1:this.plot({series,xDomain:[0,24],yDomain:[0,ymax],xTicks:this.hourTicks(),yLabel:'kW',h:320})};\n  }\n  fetchToday(){const r=this.rng(Date.now()%99991);const skies=[880,760,540,300];const peak=skies[Math.floor(r()*skies.length)]*(0.9+0.2*r());this.setState({todayFetched:true,todayPeak:peak,todayTemp:14+8*r()});}\n  pdWeek(){\n    const S=this.SITES,skyPeak={clear:900,cloudy:540,overcast:270},L=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];\n    const skyMeta={clear:{icon:'☀',name:'Clear'},cloudy:{icon:'⛅',name:'Cloudy'},overcast:{icon:'☁',name:'Overcast'}},order=['clear','cloudy','overcast'];\n    const weekDays=L.map((lab,i)=>{const cur=this.state.weekSky[i],open=this.state.weekOpen===i;return{label:lab,date:this.dstr(180+i),icon:skyMeta[cur].icon,open,\n      btnStyle:{width:'100%',padding:'8px 0',fontSize:20,lineHeight:1,border:'1px solid '+(open?this.SUN:'#e5e7eb'),borderRadius:9,background:'#fff',cursor:'pointer',boxShadow:open?'0 0 0 2px rgba(245,180,0,.25)':'none'},\n      toggle:()=>this.setState(s=>({weekOpen:s.weekOpen===i?null:i})),\n      options:order.map(v=>{const active=cur===v;return{icon:skyMeta[v].icon,name:skyMeta[v].name,onClick:()=>{const w=this.state.weekSky.slice();w[i]=v;this.setState({weekSky:w,weekOpen:null});},style:{display:'flex',alignItems:'center',gap:9,width:'100%',textAlign:'left',padding:'7px 10px',border:'none',borderRadius:6,cursor:'pointer',font:'inherit',fontSize:13,background:active?'#fff7e6':'transparent',color:active?'#111':'#4b5563',fontWeight:active?600:450}};})};});\n    const groups=L.map((lab,i)=>{const peak=skyPeak[this.state.weekSky[i]];return{label:lab,bars:Object.keys(S).map(k=>({value:this.dayTotal(k,peak,18),color:S[k].color}))};});\n    const weekTotals=Object.keys(S).map(k=>{let t=0;for(let i=0;i<7;i++)t+=this.dayTotal(k,skyPeak[this.state.weekSky[i]],18);return{label:S[k].label,dotStyle:this.dot(S[k].color),value:this.kfmt(t)};});\n    return{weekDays,weekTotals,legend:Object.keys(S).map(k=>this.legItem(S[k].label,S[k].color)),c1:this.bars({groups,yLabel:'kWh/day',h:320})};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
